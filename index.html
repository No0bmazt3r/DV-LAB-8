<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Important Dates Timeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Load D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="app-background"></div>
    <div class="container">
        <header class="glass-panel">
            <div class="header-content">
                <h1>World Important Dates</h1>
                <p>Explore humanity's most significant historical events across time, countries, and outcomes.</p>
            </div>
        </header>

        <section class="controls glass-panel">
            <div class="control-group search-group">
                <label for="search">Search Event</label>
                <div class="input-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search" list="search-options" placeholder="e.g. World War, Apollo 11, Magna Carta...">
                    <datalist id="search-options"></datalist>
                </div>
            </div>
            <div class="control-group">
                <label for="country-filter">Country</label>
                <select id="country-filter">
                    <option value="All">Global / All</option>
                </select>
            </div>
            <div class="control-group">
                <label for="event-type-filter">Event Type</label>
                <select id="event-type-filter">
                    <option value="All">All Types</option>
                </select>
            </div>
            <div class="control-group">
                <label for="outcome-filter">Outcome</label>
                <select id="outcome-filter">
                    <option value="All">All Outcomes</option>
                </select>
            </div>
            <button id="reset-btn" class="glow-btn">Reset Filters</button>
        </section>

        <section class="dashboard">
            <div class="stat-card glass-panel">
                <span class="stat-label">Visible Events</span>
                <span class="stat-value" id="visible-events">0</span>
            </div>
            <div class="stat-card glass-panel">
                <span class="stat-label">Earliest Year</span>
                <span class="stat-value" id="earliest-year">-</span>
            </div>
            <div class="stat-card glass-panel">
                <span class="stat-label">Latest Year</span>
                <span class="stat-value" id="latest-year">-</span>
            </div>
            <div class="stat-card glass-panel">
                <span class="stat-label">Countries Shown</span>
                <span class="stat-value" id="countries-shown">0</span>
            </div>
        </section>

        <section class="timeline-container glass-panel">
            <div class="timeline-header">
                <h2>Interactive Timeline</h2>
                <p>Scroll to zoom into dense periods. Drag to pan. Hover over points for details.</p>
            </div>
            <div id="legend"></div>
            <div id="timeline"></div>
        </section>
    </div>

    <div id="tooltip" class="tooltip glass-panel"></div>

    <script src="script.js"></script>
</body>
</html>
